<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#121212" />
    <title>HiddenPage Color Picker</title>
  </head>
  <body>
    <div id="app">
      <div class="picker-shell" id="pickerShell">
        <div class="picker-crosshair" id="pickerCrosshair"></div>
        <div class="picker-label" id="pickerLabel">点击屏幕任意位置取色</div>
        <div class="picker-color" id="pickerColor">#000000</div>
        <button class="picker-cancel" id="pickerCancelButton" type="button">取消 (Esc)</button>
      </div>
    </div>
    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
